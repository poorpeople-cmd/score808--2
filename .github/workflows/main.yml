


name: M3U8 Scraper with Video Recording

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target Website ka URL paste karein'
        required: true
        type: string
        default: 'https://www.808fubo15.com/football/2871794-wellington-phoenix-vs-western-sydney.html'
      drag_distance:
        description: 'Arrow ko kitna aage move karna hai (Pixels mein)?'
        required: true
        type: string
        default: '150'

jobs:
  run-scraper-and-record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ==========================================
      # 🛡️ FREE VPN (Cloudflare WARP) SETUP - IP Block Bypass
      # ==========================================
      - name: Setup Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual

      - name: Install System Dependencies (Chrome, Xvfb, FFmpeg, Fluxbox)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg fluxbox
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install DrissionPage
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage

      - name: Run Scraper inside Xvfb and Record with FFmpeg
        run: |
          # 1. Start Virtual Display
          Xvfb :99 -screen 0 1280x720x24 &
          XVFB_PID=$!
          export DISPLAY=:99
          sleep 3 
          
          # 2. Start Fluxbox
          fluxbox >/dev/null 2>&1 &
          FLUXBOX_PID=$!
          sleep 2
          
          echo "🎥 Recording shuru ho rahi hai background mein..."
          
          # 3. Start FFmpeg
          ffmpeg -loglevel warning -y -f x11grab -framerate 30 -probesize 42M -s 1280x720 -i :99 -codec:v libx264 -preset ultrafast -t 180 execution.mp4 &
          FFMPEG_PID=$!
          
          echo "🏃 Python Script run kar rahe hain (Live Logs ke sath)..."
          
          # 4. Run Python Script
          timeout 3m python -u scraper.py --url "${{ github.event.inputs.target_url }}" --drag ${{ github.event.inputs.drag_distance }} || echo "⚠️ Script ruki (Mukammal hui, Crash hui, ya Timeout ho gayi)."
          
          echo "🛑 Python script ka process khatam. Recording stop kar rahe hain..."
          
          # 5. Stop processes gracefully
          kill $FFMPEG_PID
          wait $FFMPEG_PID || true
          kill $FLUXBOX_PID || true
          kill $XVFB_PID || true
          
          echo "✅ Video file 'execution.mp4' ready hai."

      - name: Upload Video Recording
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: bot-execution-video
          path: execution.mp4
          retention-days: 1

      - name: Upload Debug Screenshots
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-screenshots
          path: screenshots/
          retention-days: 1















