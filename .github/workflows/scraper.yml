name: M3U8 Scraper Workflow

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target Website ka URL paste karein'
        required: true
        type: string
        default: 'https://www.808fubo15.com/football/2871794-wellington-phoenix-vs-western-sydney.html'
      drag_distance:
        description: 'Arrow ko kitna aage move karna hai (Pixels mein)?'
        required: true
        type: string
        default: '150'

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install DrissionPage
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage

      - name: Run Scraper Script with Inputs
        run: |
          python scraper.py --url "${{ github.event.inputs.target_url }}" --drag ${{ github.event.inputs.drag_distance }}
